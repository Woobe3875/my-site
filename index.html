<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 링크 페이지</title>
    <!-- 구글 폰트 적용 (깔끔한 프리텐다드 폰트) -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            /* 배경을 화사한 그라데이션으로 변경 */
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .profile-card {
            text-align: center;
            background: white;
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            width: 340px;
        }
        /* 프로필 이미지 꾸미기 */
        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%; /* 이미지를 동그랗게 */
            object-fit: cover;
            border: 4px solid #ffffff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 22px;
            color: #222222;
            margin: 20px 0 8px 0;
        }
        .sub-text {
            font-size: 14px;
            color: #777777;
            margin-bottom: 30px;
        }
        /* 링크 버튼 꾸미기 */
        .link-btn {
            display: block;
            background-color: #4a90e2;
            color: white;
            padding: 14px;
            margin: 12px 0;
            text-decoration: none; /* 밑줄 없애기 */
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.3s ease;
        }
        /* 버튼에 마우스를 올렸을 때 효과 */
        .link-btn:hover {
            background-color: #357abd;
            transform: translateY(-3px); /* 살짝 위로 떠오름 */
            box-shadow: 0 5px 15px rgba(74, 144, 226, 0.3);
        }
    </style>
</head>
<body>
    <div class="profile-card">
        <!-- [수정포인트 1] 나중에 내 사진 파일명으로 바꾸는 곳입니다 -->
        <img src="https://picsum.photos/200" alt="프로필 사진" class="profile-img">
        
        <!-- [수정포인트 2] 이름과 소개글을 내 정보로 바꾸세요 -->
        <h1>홍길동 (Gildong Hong)</h1>
        <p class="sub-text">방문해 주셔서 감사합니다. 저의 채널들을 확인해 보세요! ✨</p>
        
        <!-- [수정포인트 3] href="주소" 부분에 내 진짜 SNS 주소를 넣으세요 -->
        <a href="https://instagram.com" target="_blank" class="link-btn">📷 인스타그램 구경하기</a>
        <a href="https://blog.naver.com" target="_blank" class="link-btn">📝 네이버 블로그 방문</a>
        <a href="mailto:your-email@gmail.com" class="link-btn">✉️ 이메일 보내기</a>
    </div>
</body>
</html>
