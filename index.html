<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>내 블로그</title>

  <!-- ★ 1. CSS 연결 ★ -->
  <link rel="stylesheet" href="blog-features.css" />
</head>
<body>

  <!-- ★ 2. 다크모드 버튼 ★ -->
  <button id="theme-toggle" type="button" aria-label="다크 모드로 전환">
    <span class="icon-sun" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/>
        <line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/>
        <line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
    </span>
    <span class="icon-moon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </span>
    <span class="toggle-label">다크 모드</span>
  </button>

  <!-- ★ 3. TOC 사이드바 ★ -->
  <nav id="toc-sidebar" aria-label="목차">
    <p class="toc-title">목차</p>
    <ul></ul>
  </nav>

  <!-- ★ 4. 본문 콘텐츠 (여기에 포스트 내용을 작성) ★ -->
  <main style="max-width:780px; margin:60px auto; padding:0 24px;">

    <h1>나의 첫 번째 블로그 포스트</h1>

    <article class="post-content">

      <h2>첫 번째 섹션</h2>
      <p>여기에 본문 내용을 작성합니다.</p>

      <pre><code class="language-javascript">// 코드 블록 예시 – 복사 버튼이 자동으로 생깁니다
console.log("Hello, Blog!");
</code></pre>

      <h2>두 번째 섹션</h2>
      <p>스크롤을 내리면 우측에 목차가 하이라이트됩니다.</p>

      <h3>소제목</h3>
      <p>H3 태그도 TOC에 자동으로 포함됩니다.</p>

    </article>
  </main>

  <!-- ★ 5. 맨 위로 가기 버튼 ★ -->
  <button id="scroll-to-top" type="button" aria-label="맨 위로 가기">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
         width="18" height="18">
      <polyline points="18 15 12 9 6 15"/>
    </svg>
  </button>

  <!-- ★ 6. JS 연결 (반드시 </body> 바로 위) ★ -->
  <script src="blog-features.js"></script>

</body>
</html>
